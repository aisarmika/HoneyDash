<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HoneyDash | Sign In</title>

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="plugins/fontawesome-free/css/all.min.css">
  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="plugins/icheck-bootstrap/icheck-bootstrap.min.css">
  <!-- Theme style -->
  <link rel="stylesheet" href="dist/css/adminlte.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;600;700&display=swap');
    body.login-page {
      background: #060b14 !important;
      font-family: 'Inter', sans-serif !important;
    }
    .login-box { width: 380px; }
    .login-logo a { color: #00c8ff !important; font-size: 2rem; font-weight: 700; letter-spacing: 1px; }
    .login-logo a b { color: #ff3d57; }
    .login-logo small { display: block; font-size: 11px; color: #4a5568; text-transform: uppercase; letter-spacing: 2px; margin-top: -4px; font-family: 'JetBrains Mono', monospace; }
    .card {
      background: #0b1120 !important;
      border: 1px solid #1a2d4a !important;
      border-radius: 12px !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(0,200,255,0.04) !important;
    }
    .login-card-body { background: transparent !important; border-radius: 12px !important; }
    .login-box-msg { color: #6b7a99 !important; font-size: 13px !important; }
    .form-control {
      background: #060d1a !important;
      border: 1px solid #1a2d4a !important;
      color: #cdd6f4 !important;
      border-radius: 6px !important;
    }
    .form-control:focus {
      border-color: #00c8ff !important;
      box-shadow: 0 0 0 2px rgba(0,200,255,0.15) !important;
      background: #060d1a !important;
      color: #cdd6f4 !important;
    }
    .form-control::placeholder { color: #3a4a5e !important; }
    .input-group-text {
      background: #0d1626 !important;
      border-color: #1a2d4a !important;
      color: #4a5568 !important;
    }
    .btn-primary {
      background: rgba(0,200,255,0.12) !important;
      border-color: rgba(0,200,255,0.5) !important;
      color: #00c8ff !important;
      font-weight: 600 !important;
      letter-spacing: 0.5px;
      transition: all 0.2s !important;
    }
    .btn-primary:hover {
      background: rgba(0,200,255,0.22) !important;
      box-shadow: 0 0 16px rgba(0,200,255,0.25) !important;
    }
    .icheck-primary label { color: #6b7a99 !important; font-size: 12px !important; }
    .text-muted { color: #4a5568 !important; }
    .alert-danger { background: rgba(255,61,87,0.12) !important; border-color: rgba(255,61,87,0.3) !important; color: #ff6b7a !important; font-size: 13px !important; }
    /* Scan-line effect */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }
    /* Grid background */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .login-box { position: relative; z-index: 1; }
  </style>
</head>

<body class="hold-transition login-page">
  <div class="login-box">
    <div class="login-logo">
      <a href="dashboard.html"><b>Honey</b>Dash<small>Threat Intelligence Platform</small></a>
    </div>
    <!-- /.login-logo -->
    <div class="card">
      <div class="card-body login-card-body">
        <p class="login-box-msg">Sign in to start your session</p>

        <div id="loginError" class="alert alert-danger d-none" role="alert">
          Invalid email or password.
        </div>

        <form id="loginForm">
          <div class="input-group mb-3">
            <input type="email" id="loginEmail" class="form-control" placeholder="Email" required>
            <div class="input-group-append">
              <div class="input-group-text">
                <span class="fas fa-envelope"></span>
              </div>
            </div>
          </div>
          <div class="input-group mb-3">
            <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
            <div class="input-group-append">
              <div class="input-group-text">
                <span class="fas fa-lock"></span>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-8">
              <div class="icheck-primary">
                <input type="checkbox" id="remember">
                <label for="remember">Remember Me</label>
              </div>
            </div>
            <div class="col-4">
              <button type="submit" id="loginBtn" class="btn btn-primary btn-block">
                Sign In
              </button>
            </div>
          </div>
        </form>

        <p class="mt-3 mb-0 text-muted text-center">
          Default: admin@honeydash.local / admin
        </p>
      </div>
      <!-- /.login-card-body -->
    </div>
  </div>
  <!-- /.login-box -->

  <!-- jQuery -->
  <script src="plugins/jquery/jquery.min.js"></script>
  <!-- Bootstrap 4 -->
  <script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
  <!-- AdminLTE App -->
  <script src="dist/js/adminlte.min.js"></script>
  <script src="config.js"></script>

  <script>
    const API_BASE = window._HD_API;

    // Redirect to dashboard if already logged in
    if (localStorage.getItem('hd_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errBox = document.getElementById('loginError');
      errBox.classList.add('d-none');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

      try {
        const resp = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
          }),
        });

        if (!resp.ok) {
          errBox.classList.remove('d-none');
          return;
        }

        const data = await resp.json();
        localStorage.setItem('hd_token', data.access_token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errBox.textContent = 'Cannot reach server. Is the backend running?';
        errBox.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>

</html>
